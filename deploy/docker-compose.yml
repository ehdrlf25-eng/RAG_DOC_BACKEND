services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/ehdrlf25-eng/rag_doc_backend:latest}
    container_name: ragdoc-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-ragdoc}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:81}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.2}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-ollama}
      RAG_LLM_PROVIDER: ${RAG_LLM_PROVIDER:-ollama}
      RAG_EMBEDDING_DIMENSIONS: ${RAG_EMBEDDING_DIMENSIONS:-768}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_HOST_PORT:-8081}:8080"
    networks:
      - ragdoc-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/ehdrlf25-eng/rag_doc_frontend:latest}
    container_name: ragdoc-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-81}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ragdoc-net

networks:
  ragdoc-net:
    name: ragdoc-net
    driver: bridge
