services:
  redis:
    image: redis:7-alpine
    container_name: ragdoc-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ragdoc-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  ragdoc-net:
    name: ragdoc-net
    driver: bridge

volumes:
  redis_data:
    name: ragdoc_redis_data
