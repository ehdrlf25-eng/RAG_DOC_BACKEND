spring:
  application:
    name: rag-doc-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ragdoc}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

server:
  port: 8080

app:
  jwt:
    secret: change-me-to-a-secure-secret-key-at-least-32-chars
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173
  cache:
    user-ttl: 30m
  rag:
    storage:
      path: ${RAG_STORAGE_PATH:./storage/documents}
    retrieval:
      top-k: 5
      max-history-messages: 10
      min-similarity: 0.8
      hybrid-candidate-limit: 40
      hybrid-dense-min-similarity: 0.3
      rrf-k: 60
      rerank-candidate-limit: 20
      parent-expansion-limit: 5
      reranker-provider: llm
    reembed-on-startup: ${RAG_REEMBED_ON_STARTUP:false}
    chunking:
      child-max-tokens: 256
    embedding:
      provider: ${RAG_EMBEDDING_PROVIDER:openai}
      dimensions: ${RAG_EMBEDDING_DIMENSIONS:1536}
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
      ollama:
        base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    llm:
      provider: ${RAG_LLM_PROVIDER:openai}
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
      ollama:
        base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
        model: ${OLLAMA_CHAT_MODEL:llama3.2}

logging:
  level:
    org.springframework.security: INFO
    com.ragdoc.platform.document: INFO
    com.ragdoc.platform.conversation: INFO
    com.ragdoc.platform.conversation.ConversationService: DEBUG
    com.ragdoc.platform.rag: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
