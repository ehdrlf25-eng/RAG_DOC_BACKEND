spring:
  application:
    name: rag-doc-platform
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://localhost:5432/ragdoc
    username: postgres
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

app:
  jwt:
    secret: change-me-to-a-secure-secret-key-at-least-32-chars
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173

logging:
  level:
    org.springframework.security: INFO
