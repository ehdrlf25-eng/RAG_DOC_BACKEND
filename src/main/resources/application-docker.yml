spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:ragdoc}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-secure-secret-key-at-least-32-chars}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost}
  cache:
    user-ttl: ${USER_CACHE_TTL:30m}
  rag:
    storage:
      path: ${RAG_STORAGE_PATH:/app/storage/documents}
    embedding:
      provider: ${RAG_EMBEDDING_PROVIDER:ollama}
      dimensions: ${RAG_EMBEDDING_DIMENSIONS:768}
      ollama:
        base-url: ${OLLAMA_BASE_URL:http://host.docker.internal:11434}
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    llm:
      provider: ${RAG_LLM_PROVIDER:ollama}
      ollama:
        base-url: ${OLLAMA_BASE_URL:http://host.docker.internal:11434}
        model: ${OLLAMA_CHAT_MODEL:llama3.2}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
