spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:ragdoc}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-secure-secret-key-at-least-32-chars}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
