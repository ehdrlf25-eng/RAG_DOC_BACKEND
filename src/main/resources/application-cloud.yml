spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:ragdoc}?sslmode=require
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:ragdoc-platform}

app:
  kafka:
    topics:
      document-uploaded: document.uploaded
      document-processed: document.processed
      document-processing-failed: document.processing-failed
      document-uploaded-dlq: document.uploaded.dlq
    consumer:
      retry-interval-ms: 1000
      max-attempts: 3
    outbox:
      publish-interval-ms: 1000
      max-publish-retries: 5
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-secure-secret-key-at-least-32-chars}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost}
  cache:
    user-ttl: ${USER_CACHE_TTL:30m}
  rag:
    storage:
      provider: s3
      bucket: ${AWS_S3_BUCKET}
      region: ${AWS_REGION:ap-northeast-2}
      path: ${RAG_STORAGE_PATH:/tmp}
    reembed-on-startup: ${RAG_REEMBED_ON_STARTUP:false}
    embedding:
      provider: ${RAG_EMBEDDING_PROVIDER:openai}
      dimensions: ${RAG_EMBEDDING_DIMENSIONS:1536}
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
      ollama:
        base-url: ${OLLAMA_BASE_URL:http://host.docker.internal:11434}
        model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
    llm:
      provider: ${RAG_LLM_PROVIDER:openai}
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
        model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
      ollama:
        base-url: ${OLLAMA_BASE_URL:http://host.docker.internal:11434}
        model: ${OLLAMA_CHAT_MODEL:llama3.2}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
