spring:
  datasource:
    url: jdbc:h2:mem:ragdoc;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

app:
  jwt:
    secret: test-secret-key-for-unit-tests-only-32chars
    expiration-ms: 3600000
  cors:
    allowed-origins: http://localhost:5173
  cache:
    user-ttl: 5m
  rag:
    storage:
      path: ./build/test-storage
    retrieval:
      top-k: 3
      max-history-messages: 5
      min-similarity: 0.8
      hybrid-candidate-limit: 20
      hybrid-dense-min-similarity: 0.0
      rrf-k: 60
      rerank-candidate-limit: 10
      parent-expansion-limit: 3
      reranker-provider: passthrough
    chunking:
      child-max-tokens: 256
    embedding:
      provider: mock
      dimensions: 8
      openai:
        api-key: test
        base-url: https://api.openai.com/v1
        model: text-embedding-3-small
      ollama:
        base-url: http://localhost:11434
        model: nomic-embed-text
    llm:
      provider: mock
      openai:
        api-key: test
        base-url: https://api.openai.com/v1
        model: gpt-4o-mini
      ollama:
        base-url: http://localhost:11434
        model: llama3.2
